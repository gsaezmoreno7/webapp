<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ítem 1 - El Cirujano del DOM: Interfaz dinámica con JavaScript y eventos">
    <title>El Cirujano del DOM — Evaluación CIB302</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <header class="header">
            <div class="header-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
                </svg>
            </div>
            <h1>El Cirujano del DOM</h1>
            <p class="subtitle">Manipulación dinámica del DOM con JavaScript ES6+</p>
        </header>

        <section class="card input-section">
            <h2>Agregar Elemento</h2>
            <form id="formAgregar" class="form-group">
                <div class="input-wrapper">
                    <input type="text" id="inputTexto" placeholder="Escribe algo y presiona Enter o el botón..."
                        autocomplete="off" required>
                    <button type="submit" id="btnAgregar" class="btn-submit">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Agregar
                    </button>
                </div>
            </form>
        </section>

        <section class="card list-section">
            <div class="list-header">
                <h2>Lista Dinámica</h2>
                <span id="contadorItems" class="badge">0 elementos</span>
            </div>
            <ul id="listaItems" class="dynamic-list">
                <!-- Los elementos se agregan dinámicamente aquí con JS -->
            </ul>
            <div id="emptyState" class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                <p>No hay elementos aún. ¡Agrega el primero!</p>
            </div>
        </section>

        <footer class="footer">
            <p>Evaluación CIB302 — Ítem 1: El Cirujano del DOM</p>
            <p class="footer-sub">Uso de <code>createElement</code>, <code>appendChild</code> y eventos
                <code>submit</code></p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>

</html>
